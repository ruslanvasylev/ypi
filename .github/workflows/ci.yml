name: CI

# Hermetic PR/push gate — the ONLY automated check that runs on inbound PRs
# (local git hooks never run on a contributor's machine, and the maintainer's
# jj workflow bypasses git hooks). Deliberately:
#   * NO real-LLM e2e (those run locally via `make release-preflight` at release time),
#   * pi PINNED to .pi-version, never "latest", so an upstream pi release can never
#     redden this gate. Upstream drift is a re-pin signal handled locally, not in CI.
# Green here = a fresh clean-room repro of the hermetic gates + packaging.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Pi (pinned to .pi-version, never "latest")
        run: bun install -g "@earendil-works/pi-coding-agent@$(tr -d '[:space:]' < .pi-version)"

      - name: Show versions
        run: |
          echo "pi: $(pi --version)"
          echo "bun: $(bun --version)"

      - name: Hermetic gate (test-fast + extensions + pack tests; no LLM, no publish)
        run: scripts/pre-push-checks
